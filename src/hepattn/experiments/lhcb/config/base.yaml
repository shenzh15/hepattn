seed_everything: 42

name: new_baseline_small_lr5e-4_clip10_all_metrics

data:
  train_path: /data/bfys/shenzh/4Dtracking/hepattn/data/lhcb/version5_hdf5/train.h5
  val_path: /data/bfys/shenzh/4Dtracking/hepattn/data/lhcb/version5_hdf5/val.h5
  test_path: null  # Optional, only needed for testing

  # DataLoader parameters
  batch_size: 32
  num_workers: 2
  pin_memory: true

  # Number of events to use (-1 means all)
  num_train: -1
  num_val: 2000
  num_test: -1

  # Maximum vertices per event (events with more will be filtered)
  max_vertices: &max_vertices 100

  # Path to variable transformation/scaling configuration
  scale_dict_path: /data/bfys/shenzh/4Dtracking/hepattn/src/hepattn/experiments/lhcb/config/lhcb_var_transform5.yaml

  # Input features (all track features including beamPOCA)
  inputs:
    tracks:
      - 'backward'
      - 'c00'
      - 'c20'
      - 'c22'
      - 'c55'
      - 'chi2'
      - 'beamPOCA_tx'
      - 'beamPOCA_ty'
      - 'beamPOCA_x'
      - 'beamPOCA_y'
      - 'beamPOCA_z'
      - 'beamPOCA_t'

  # Target features
  targets:
    vertex:
      - 'ovtx_z'
      - 'ovtx_t'
      - 'is_pv'

trainer:
  max_epochs: 100
  accelerator: gpu
  devices: 1
  precision: 32
  log_every_n_steps: 10
  default_root_dir: logs
  gradient_clip_val: 10.0
  accumulate_grad_batches: 1
  enable_progress_bar: true
  val_check_interval: 100

  logger:
    class_path: hepattn.utils.loggers.MyCometLogger
    init_args:
      project: lhcb

  callbacks:
    - class_path: hepattn.callbacks.SaveConfig

    # Checkpoint 1: Regular interval saves (every 1000 steps)
    - class_path: hepattn.callbacks.Checkpoint
      init_args:
        monitor: train/loss
        every_n_train_steps: 1000

    # Checkpoint 2: Keep best checkpoints based on validation loss
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        monitor: val/loss
        save_top_k: 3  # Keep best 3 checkpoints
        mode: min
        filename: "best-{epoch:03d}-val_loss={loss:.5f}"
        dirpath: ckpts  # Save to same directory as training checkpoints
    # - class_path: lightning.pytorch.callbacks.ModelSummary
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    - class_path: lightning.pytorch.callbacks.TQDMProgressBar
      init_args:
        refresh_rate: 5
    - class_path: hepattn.callbacks.GradientLoggerCallback
      init_args:
        log_every_n_steps: 10
        log_per_loss_grads: true

model:
  optimizer: AdamW

  lrs_config:
    initial: 1e-8
    max: 5e-4
    end: 1e-6
    pct_start: 0.05
    skip_scheduler: false
    weight_decay: 1e-4

  mtl: false

  model:
    class_path: hepattn.models.MaskFormer
    init_args:
      sorter:
        class_path: hepattn.utils.sorter.Sorter
        init_args:
          input_sort_field: beamPOCA_z  # Sort tracks along beam direction
      dim: &dim 256
      target_object: vertex

      input_nets:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            - class_path: hepattn.models.InputNet
              init_args:
                input_name: tracks
                fields:
                  - backward
                  - c00
                  - c20
                  - c22
                  - c55
                  - chi2
                net:
                  class_path: hepattn.models.Dense
                  init_args:
                    input_size: 6
                    output_size: *dim
                posenc:
                  class_path: hepattn.models.posenc.PositionEncoder
                  init_args:
                    input_name: tracks
                    dim: *dim
                    fields:
                      - beamPOCA_tx
                      - beamPOCA_ty
                      - beamPOCA_x
                      - beamPOCA_y
                      - beamPOCA_z
                      - beamPOCA_t

      encoder:
        class_path: hepattn.models.Encoder
        init_args:
          num_layers: 3
          dim: *dim
          attn_type: torch

      decoder:
        num_decoder_layers: 3
        num_queries: *max_vertices
        mask_attention: true
        use_query_masks: false
        decoder_layer_config:
          dim: *dim

      matcher:
        class_path: hepattn.models.matcher.Matcher
        init_args:
          default_solver: scipy
          adaptive_solver: false
          adaptive_check_interval: 1000

      tasks:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            # Task 1: Vertex Classification (object_class_ce)
            - class_path: hepattn.models.task.ObjectClassificationTask
              init_args:
                name: vertex_classification
                input_object: query
                output_object: vertex
                target_object: vertex
                num_classes: 2  # PV=0, SV=1, null=2
                losses:
                  object_ce: 0.5
                costs:
                  object_ce: 0.5
                net:
                  class_path: hepattn.models.Dense
                  init_args:
                    input_size: *dim
                    output_size: 3  # num_classes + 1 (null)
                null_weight: 0.5
                mask_queries: false
                has_intermediate_loss: true

            # Task 2: Track-Vertex Assignment Mask (mask_ce + mask_dice)
            - class_path: hepattn.models.task.ObjectHitMaskTask
              init_args:
                name: track_assignment
                input_constituent: tracks
                input_object: query
                output_object: vertex
                target_object: vertex
                losses:
                  mask_bce: 10.0    # equivalent to mask_ce
                  mask_dice: 8.0    # dice loss
                costs:
                  mask_bce: 10.0
                  mask_dice: 8.0
                dim: *dim
                null_weight: 1.0
                mask_attn: true
                has_intermediate_loss: true

            # Task 3: Vertex Position Regression
            - class_path: hepattn.models.task.ObjectRegressionTask
              init_args:
                name: vertex_regression
                input_object: query
                output_object: vertex
                target_object: vertex
                fields: [ovtx_z, ovtx_t]
                loss_weight: 2.0  # regression weight
                cost_weight: 2.0
                dim: *dim
                loss: smooth_l1
                has_intermediate_loss: true
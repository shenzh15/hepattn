seed_everything: 42

name: lhcb_vertex_reconstruction

data:
  train_path: /data/bfys/shenzh/4Dtracking/hepattn/data/lhcb/version3_hdf5/train.h5
  val_path: /data/bfys/shenzh/4Dtracking/hepattn/data/lhcb/version3_hdf5/val.h5
  test_path: null  # Optional, only needed for testing

  # DataLoader parameters
  batch_size: 4
  num_workers: 8
  pin_memory: true

  # Number of events to use (-1 means all)
  num_train: -1
  num_val: 100
  num_test: -1

  # Maximum vertices per event (events with more will be filtered)
  max_vertices: &max_vertices 100

  # Path to variable transformation/scaling configuration
  scale_dict_path: /data/bfys/shenzh/4Dtracking/hepattn/src/hepattn/experiments/lhcb/config/lhcb_var_transform.yaml

  # Input features (all track features including beamPOCA)
  inputs:
    tracks:
      - 'backward'
      - 'c00'
      - 'c31'
      - 'c33'
      - 'c55'
      - 'chi2'
      - 'beamPOCA_tx'
      - 'beamPOCA_ty'
      - 'beamPOCA_x'
      - 'beamPOCA_y'
      - 'beamPOCA_z'
      - 'beamPOCA_t'

  # Target features
  targets:
    vertex:
      - 'ovtx_x'
      - 'ovtx_y'
      - 'ovtx_z'
      - 'ovtx_t'
      - 'is_pv'

trainer:
  max_epochs: 10
  accelerator: gpu
  devices: 1
  precision: 32
  log_every_n_steps: 10
  default_root_dir: logs
  gradient_clip_val: 0.1
  accumulate_grad_batches: 1
  enable_progress_bar: true
  val_check_interval: 100

  logger:
    class_path: hepattn.utils.loggers.MyCometLogger
    init_args:
      project: lhcb

  callbacks:
    - class_path: hepattn.callbacks.SaveConfig
    - class_path: hepattn.callbacks.Checkpoint
      init_args:
        monitor: train/loss
        every_n_train_steps: 1000
    # - class_path: lightning.pytorch.callbacks.ModelSummary
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    - class_path: lightning.pytorch.callbacks.TQDMProgressBar
      init_args:
        refresh_rate: 5

model:
  optimizer: AdamW

  lrs_config:
    initial: 1e-5
    max: 5e-4
    end: 1e-5
    pct_start: 0.01
    skip_scheduler: false
    weight_decay: 1e-4

  mtl: false

  model:
    class_path: hepattn.models.MaskFormer
    init_args:
      dim: &dim 256
      input_sort_field: beamPOCA_z
      target_object: vertex

      input_nets:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            - class_path: hepattn.models.InputNet
              init_args:
                input_name: tracks
                fields:
                  - backward
                  - c00
                  - c31
                  - c33
                  - c55
                  - chi2
                net:
                  class_path: hepattn.models.Dense
                  init_args:
                    input_size: 6
                    output_size: *dim
                posenc:
                  class_path: hepattn.models.posenc.PositionEncoder
                  init_args:
                    input_name: tracks
                    dim: *dim
                    fields:
                      - beamPOCA_tx
                      - beamPOCA_ty
                      - beamPOCA_x
                      - beamPOCA_y
                      - beamPOCA_z
                      - beamPOCA_t

      encoder:
        class_path: hepattn.models.Encoder
        init_args:
          num_layers: 6
          dim: *dim
          attn_type: torch

      decoder:
        num_decoder_layers: 6
        num_queries: *max_vertices
        mask_attention: true
        use_query_masks: false
        decoder_layer_config:
          dim: *dim

      matcher:
        class_path: hepattn.models.matcher.Matcher
        init_args:
          default_solver: scipy
          adaptive_solver: false
          adaptive_check_interval: 1000

      tasks:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            - class_path: hepattn.models.task.ObjectValidTask
              init_args:
                name: pred_vertex_valid
                input_object: query
                output_object: pred
                target_object: vertex
                losses:
                  object_bce: 1.0
                costs:
                  object_bce: 10.0
                dim: *dim
                null_weight: 1.0
                mask_queries: false

            - class_path: hepattn.models.task.ObjectHitMaskTask
              init_args:
                name: pred_track_assignment
                input_constituent: tracks
                input_object: query
                output_object: pred
                target_object: vertex
                losses:
                  mask_bce: 10.0
                costs:
                  mask_bce: 10.0
                dim: *dim
                null_weight: 1.0